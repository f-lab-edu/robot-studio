services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: robot_studio
      POSTGRES_PASSWORD: robot_studio
      POSTGRES_DB: robot_studio
    volumes:
      - postgres_data:/var/lib/postgresql/data

  fastapi:
    build: ./server
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://robot_studio:robot_studio@postgres:5432/robot_studio
      REDIS_URL: redis://redis:6379 
    env_file:
      - ./server/.env
    depends_on:
      - postgres
      - redis
    volumes:
      - ./server/app:/app/app

  web:
    build: ./web
    ports:
      - "3000:80"
    depends_on:
      - fastapi

volumes:
  postgres_data:
